const typeMap=[{key:"shiRe",qs:[0,1]},{key:"xuRe",qs:[2,3]},{key:"xuHan",qs:[4,5]},{key:"tanShiRe",qs:[6,7]},{key:"qiXu",qs:[8,9]},{key:"xueXu",qs:[10,11]},{key:"qiYu",qs:[12,13]},{key:"xueYu",qs:[14,15]}];
const stage1=["您怕熱而耐寒嗎？","您容易上火（常有咽喉痛、舌瘡、口腔潰瘍、口、鼻、唇乾熱感或生瘡癤）嗎？","您感到手腳心發熱嗎？","您皮膚或口唇乾嗎？","您手腳發涼嗎？","您感到怕冷、衣服比別人穿得多嗎？","您面部或鼻部有油膩感或者油亮發光嗎？","您大便黏滯不爽、有解不盡的感覺嗎？","您容易疲乏，即使休息後仍覺得累嗎？","您說話聲音低弱無力嗎？","您的面色蒼白或面色黃而無光澤嗎？","您容易頭暈眼花嗎？（特別是下蹲起立時）","您容易精神緊張、焦慮不安嗎？","您無緣無故嘆氣嗎？","您身體上有哪裡疼痛嗎？","您面色晦黯或容易出現褐斑嗎？"];
const stage2={shiRe:["您怕熱而耐寒嗎？","您喜歡吃寒涼飲食，或耐受寒涼藥物嗎？","您容易上火（常有咽喉痛、舌瘡、口腔潰瘍、口、鼻、唇乾熱感或生瘡癤）嗎？","您舌體偏紅嗎？","您容易口乾，渴喜冷飲嗎？","您的性慾較強嗎？","您形體強壯結實嗎？","您小便色黃嗎？"],xuRe:["您感到手腳心發熱嗎？","您感覺身體、臉上發熱嗎？","您皮膚或口唇乾嗎？","您口唇的顏色比一般人紅嗎？","您容易便秘或大便乾燥嗎？","您面部兩顴潮紅或偏紅嗎？","您感到眼睛乾澀嗎？","您感到口乾咽燥，總想喝水嗎？"],xuHan:["您手腳發涼嗎？","您的胃脘部、背部或腰膝部怕冷嗎？","您感到怕冷、衣服比別人穿得多嗎？","您比一般人耐受不了寒冷（冬天的寒冷，夏天的冷氣空調、電扇等）嗎？","您比別人容易患感冒嗎？","您吃喝涼的東西會感到不舒服或怕吃喝涼東西嗎？","您受涼或吃喝涼的東西後，容易腹瀉（拉肚子）嗎？"],tanShiRe:["您面部或鼻部有油膩感或者油亮發光嗎？","您容易生痤瘡或瘡癤嗎？","您感到口苦或嘴裡有異味嗎？","您大便黏滯不爽、有解不盡的感覺嗎？","您小便時尿道有發熱感、尿色濃（深）嗎？",{female:"您帶下色黃（白帶顏色發黃）嗎？限女性答",male:"您的陰囊部位潮濕嗎？限男性答"}],qiXu:["您容易疲乏嗎？","您容易氣短（呼吸短促，接不上氣）嗎？","您容易心慌嗎？","您容易頭暈或站起時眩暈嗎？","您比別人容易感冒嗎？","您喜歡安靜、懶得說話嗎？","您說話聲音低弱無力嗎？","您活動量稍大就容易出虛汗嗎？"],xueXu:["您的面色蒼白或面色黃而無光澤嗎？","您容易頭暈眼花嗎？（特別是下蹲起立時）",{female:"您的月經顏色淺淡而經量少嗎？限女性答",male:null},"您感覺肢體容易麻木嗎？","您的口唇顏色淡白嗎？","您的指甲顏色淡白嗎？","您的舌體顏色淡白嗎？","您的睡眠品質不好或容易多夢嗎？"],qiYu:["您感到悶悶不樂、情緒低沉嗎？","您容易精神緊張、焦慮不安嗎？","您多愁善感、感情脆弱嗎？","您容易感到害怕或受到驚嚇嗎？","您脅肋部或乳房脹痛嗎？","您無緣無故嘆氣嗎？","您咽喉部有異物感，且吐之不出、咽之不下嗎？"],xueYu:["您的皮膚在不知不覺中會出現青紫瘀斑（皮下出血）嗎？","您兩顴部有細微紅絲嗎？","您身體上有哪裡疼痛嗎？","您面色晦黯或容易出現褐斑嗎？","您容易有黑眼圈嗎？","您容易忘事（健忘）嗎？","您口唇顏色偏黯嗎？"],pingHe:["您精力充沛嗎？","您容易疲乏嗎？","您說話聲音低弱無力嗎？","您感到悶悶不樂、情緒低沉嗎？","您比一般人耐受不了寒冷（冬天的寒冷，夏天的冷氣空調、電扇等）嗎？","您能適應外界自然和社會環境的變化嗎？","您容易失眠嗎？"]};
const reversePingHe=[1,2,3,4,6];
function go(id){document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");scrollTo(0,0)}
function img(file){return `<img src="assets/${file}" alt="">`}
function poseFor(key,idx){let arr=meta[key].images||[meta[key].animal];return arr[idx % arr.length];}
function selectGender(g,e){gender=g;document.querySelectorAll(".genderChoice").forEach(c=>c.classList.remove("selected"));e.classList.add("selected");document.getElementById("genderNext").disabled=false}
function cleanQs(k){return stage2[k].map(q=>typeof q==="string"?q:(q[gender]||null)).filter(Boolean)}
function makeStepper(a){let s="";for(let i=1;i<=5;i++)s+=`<div class="step ${i===a?'active':''}">${i}</div>`;return s}
function startStage1(){mode="stage1";current=0;answers=[];renderQ();go("question")}
function renderQ(){let qs,key,active,label;if(mode==="stage1"){qs=stage1;key=typeMap[Math.floor(current/2)]?.key||"qiXu";active=2;label=`第 ${current+1} 題（共 16 題）`}else{key=stage2List[0];qs=cleanQs(key);active=key==="pingHe"?5:3;label=`${meta[key].name}問卷（${current+1}/${qs.length}）`}document.getElementById("stepper").innerHTML=makeStepper(active);document.getElementById("qCount").innerText=label;document.getElementById("progressBar").style.width=((current+1)/qs.length*100)+"%";document.getElementById("mascot").innerHTML=img(poseFor(key,current));document.getElementById("qText").innerText=qs[current];document.getElementById("animalTip").innerText=meta[key].tip;let box=document.getElementById("scale");box.innerHTML="";for(let i=1;i<=5;i++){let w=document.createElement("div");w.className="scoreWrap";w.innerHTML=`<div class="scoreNum">${i}</div><button class="scoreBtn ${answers[current]===i?'selected':''}"></button><div class="scoreLabel">${labels[i-1]}</div>`;w.onclick=()=>{answers[current]=i;renderQ()};box.appendChild(w)}document.getElementById("nextBtn").innerText=current===qs.length-1?"完成":"下一題"}
function prevQ(){if(current>0){current--;renderQ()}}
function nextQ(){let qs=mode==="stage1"?stage1:cleanQs(stage2List[0]);if(!answers[current]){alert("請先選擇 1～5 分");return}if(current<qs.length-1){current++;renderQ();return}mode==="stage1"?finishStage1():finishStage2One()}
function finishStage1(){let scores=typeMap.map(t=>{let score=t.qs.reduce((a,i)=>a+answers[i],0);return {...meta[t.key],key:t.key,score}});let max=Math.max(...scores.map(s=>s.score));stage2List=scores.filter(s=>s.score===max).map(s=>s.key);document.getElementById("scoreTable").innerHTML=`<table class="table">`+scores.map(s=>`<tr><td><img class="mini" src="assets/${s.animal}">${s.name}</td><td><div class="track"><div class="fill" style="width:${s.score*10}%"></div></div></td><td>${s.score}分</td></tr>`).join("")+`</table>`;document.getElementById("stage1Conclusion").innerHTML=`最高分體質：<b>${stage2List.map(k=>meta[k].name).join("、")}</b><br>若同分，系統會全部進入第二階段。`;document.getElementById("resultAnimalPreview").innerHTML=img(meta[stage2List[0]].animal);go("stage1Result")}
function startStage2(){stage2Results=[];answers=[];current=0;mode="stage2";renderQ();go("question")}
function finishStage2One(){let key=stage2List.shift(),qs=cleanQs(key),raw=0;answers.forEach((v,i)=>raw+=(key==="pingHe"&&reversePingHe.includes(i))?6-v:v);let score=Math.round(((raw-qs.length)/(qs.length*4))*100);let judge=(key==="pingHe"?(score>=60?"是":"否"):(score>40?"是":(score>=30?"傾向是":"否")));stage2Results.push({...meta[key],key,score,judge,raw,n:qs.length});if(stage2List.length){answers=[];current=0;renderQ();return}let valid=stage2Results.filter(r=>r.key==="pingHe"?r.score>=60:r.score>=30);if(valid.length===0&&key!=="pingHe"){stage2List=["pingHe"];answers=[];current=0;renderQ();return}showFinal((valid.length?valid:stage2Results).sort((a,b)=>b.score-a.score)[0],stage2Results)}
function showFinal(best,all){document.getElementById("finalMascot").innerHTML=img(best.animal);document.getElementById("finalTitle").innerHTML=`您的主要體質為<br>${best.name}<br><span style="font-size:1rem;color:#8a5a2c">${best.label}夥伴</span>`;document.getElementById("finalScore").innerText=`${best.score}分`;document.getElementById("finalJudge").innerText=`判定結果：${best.judge}`;document.getElementById("finalDetails").innerHTML=`<table class="table"><tr><th>體質</th><th>分數</th><th>判定</th></tr>`+all.map(r=>`<tr><td><img class="mini" src="assets/${r.animal}">${r.name}</td><td>${r.score}分</td><td>${r.judge}</td></tr>`).join("")+`</table><div class="disclaimer">計算公式：[(總分－題數)/(題數×4)]×100；平和體質需 ≥60 分才成立。</div>`;document.getElementById("finalAdvice").innerHTML=best.advice.map((a,i)=>`<div class="advice"><div class="iconBox">${["🥗","🍵","🌿"][i]}</div><div>${a}</div></div>`).join("");go("final")}
function restart(){gender=null;stage2List=[];stage2Results=[];answers=[];current=0;document.querySelectorAll(".genderChoice").forEach(c=>c.classList.remove("selected"));document.getElementById("genderNext").disabled=true;go("home")}
</script>
</body></html>
